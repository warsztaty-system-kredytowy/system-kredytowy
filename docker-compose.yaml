services:
  app:
    image: "spring-boot:latest"
    build:
      context: .
      dockerfile: app.Dockerfile
    container_name: app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - net
    extra_hosts:
      - "keycloak.local:host-gateway"

  db:
    image: "postgres:latest"
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=default_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d keycloak_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - net

  keycloak:
    image: "keycloak:latest"
    container_name: keycloak
    build:
      context: .
      dockerfile: keycloak.Dockerfile
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://db:5432/keycloak_db
      - KC_DB_USERNAME=user
      - KC_DB_PASSWORD=password
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_HOSTNAME=http://keycloak.local:8081
      - KC_HTTP_ENABLED=true
    ports:
      - 8081:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "{ printf \'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n\' >&0; grep \'HTTP/1.0 200\'; } 0<>/dev/tcp/localhost/9000" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - net

volumes:
  postgres_data:

networks:
  net:
    driver: bridge