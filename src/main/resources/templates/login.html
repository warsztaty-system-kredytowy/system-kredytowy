<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Credit System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%231e3a8a%22 d=%22M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-8.5-9L2 6v2h19V6l-9.5-5z%22/></svg>">
    <link rel="stylesheet" type="text/css" href="/navbar.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-container { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); width: 100%; max-width: 400px; padding: 40px; }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 2px solid #1e3a8a; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; font-family: 'Roboto', sans-serif; }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        button { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease-in-out; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Roboto', sans-serif; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); background-color: #1e3a8a; }
        button:active { transform: translateY(0); }
        .create-account-btn { width: 100%; padding: 12px; background: none; border: 2px solid #1e3a8a; color: #1e3a8a; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease-in-out; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-family: 'Roboto', sans-serif; }
        .create-account-btn:hover { background-color: rgba(30, 58, 138, 0.1); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); }
        .error { color: #842029; background: #f8d7da; border: 1px solid #f5c6cb; padding: 12px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .error.show { display: block; }
        .remember-me { display: flex; align-items: center; margin-bottom: 20px; font-size: 14px; color: #666; }
        .remember-me input { margin-right: 8px; cursor: pointer; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer a { color: #1e3a8a; text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .divider { margin: 30px 0; text-align: center; color: #aaa; font-size: 12px; }
        .header { position: fixed; top: 0; left: 0; right: 0; background-color: white; padding: 15px 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
        .header-logo { display: flex; align-items: center; gap: 8px; color: #1e3a8a; font-weight: 700; font-size: 1.1rem; }
        .header-logo .material-icons { font-size: 1.6rem; }
        .client-badge { background: #1e3a8a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-left: auto; }
        .test-credentials { background: #f8f9ff; border-left: 4px solid #3b82f6; padding: 12px; border-radius: 4px; margin-top: 20px; font-size: 13px; color: #333; }
        .test-credentials strong { color: #1e3a8a; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="header-logo">
            <span class="material-icons">account_balance</span>
            <span>Loan Application</span>
        </div>
        <div class="client-badge">CLIENT PORTAL</div>
    </div>
</div>

<div class="login-container" style="margin-top: 60px;">
    <h1>🔐 Login</h1>
    <p class="subtitle">Credit System</p>

    <div id="errorMsg" class="error"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe" style="margin-bottom: 0;">Remember me</label>
        </div>

        <button type="submit">
            <span class="material-icons">login</span>
            <span>Sign In</span>
        </button>
    </form>

    <div class="divider">Don't have an account?</div>

    <a th:href="@{/register}" href="/register" class="create-account-btn" style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: white; color: #1e3a8a; border: 2px solid #1e3a8a; border-radius: 6px; font-size: 16px; font-weight: 600; text-decoration: none; transition: all 0.2s ease-in-out; margin-top: 10px;">
        <span class="material-icons">person_add</span>
        <span>Create Account</span>
    </a>

    <div class="test-credentials">
        <strong>Test Credentials:</strong><br>
        Username: user<br>
        Password: password
    </div>

    <div class="footer" style="margin-top: 20px;">
        <a th:href="@{/home}" href="/home">← Back to Main Site</a>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    const savedUsername = localStorage.getItem('savedUsername');
    if (savedUsername) {
        usernameInput.value = savedUsername;
        document.getElementById('rememberMe').checked = true;
    }

    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
            showError('Please enter both username and password');
            return;
        }

        const button = loginForm.querySelector('button');
        button.disabled = true;
        button.textContent = 'Signing in...';

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            });

            if (response.ok) {
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('savedUsername');
                }

                window.location.href = '/submit';
            } else if (response.status === 401) {
                showError('Invalid username or password');
            } else {
                showError('Login failed. Please try again.');
            }
        } catch (error) {
            console.error('Login error:', error);
            showError('Network error. Please try again.');
        } finally {
            button.disabled = false;
            button.textContent = 'Sign In';
        }
    });

    function showError(message) {
        errorMsg.textContent = message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 5000);
    }

    usernameInput.addEventListener('input', hideError);
    passwordInput.addEventListener('input', hideError);

    function hideError() {
        errorMsg.classList.remove('show');
    }
</script>

</body>
</html>
