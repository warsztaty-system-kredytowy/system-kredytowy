<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Loan Application')}"></head>

<body>
    <main class="content">
        <div th:replace="~{fragments/common :: navbar}"></div>

        <!-- Navbar -->
        <nav class="navbar"></nav>

        <!-- Hero Section -->
        <div style="width: 90%; max-width: 1000px; margin: 0 auto; min-height: calc(100vh - 160px); display: flex; align-items: center; justify-content: center;">
            <div class="credit-container"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 40px; width: 100%;">
                <h1 style="font-size: 3.5rem; color: #1e3a8a; font-weight: 700; margin-bottom: 20px; line-height: 1.2;">
                    Fast, Secure & Transparent<br>Loan Solutions
                </h1>
                <p style="font-size: 1.2rem; color: #555; max-width: 700px; margin-bottom: 40px; line-height: 1.6;">
                    Take control of your financial future today. Apply for a loan in minutes and get a decision quickly.
                    We offer flexible terms and competitive rates tailored to your needs.
                </p>
                <button onclick="window.location.href='/submit'" class="credit-button"
                    style="font-size: 1.2rem; padding: 15px 40px; background-color: #1e3a8a; color: white; border-radius: 30px; box-shadow: 0 4px 15px rgba(30, 58, 138, 0.4); transition: transform 0.2s, box-shadow 0.2s;">
                    <span class="material-icons" style="margin-right: 8px;">rocket_launch</span>
                    Get Started Now
                </button>
            </div>
        </div>

        <footer th:replace="~{fragments/common :: footer}"></footer>
    </main>
</body>

</html>
