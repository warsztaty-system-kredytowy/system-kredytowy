<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Submit Application - Loan Application')}"></head>

<body>
    <style>
        body { font-family: 'Roboto', sans-serif; margin-bottom: 80px; }
        main { margin-top: 80px; }
        .container { max-width: 1000px; margin: 40px auto 40px auto; padding: 0 20px 150px 20px; }
        h1 { color: #1e3a8a; margin-bottom: 8px; }
        h2 { color: #1e3a8a; margin: 32px 0 16px; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        h3 { color: #1e3a8a; margin: 24px 0 12px; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .credit-container { background: rgba(245, 245, 245, 0.6); border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); padding: 28px 32px; margin-bottom: 24px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group { margin-bottom: 0; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 14px; }
        input[type="number"], input[type="date"], textarea { width: 100%; padding: 11px 12px; border: 2px solid #1e3a8a; border-radius: 6px; font-size: 14px; font-family: 'Roboto', sans-serif; transition: border-color 0.3s, box-shadow 0.3s; box-sizing: border-box; background: white; }
        input[type="number"]:focus, input[type="date"]:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        textarea { resize: vertical; min-height: 90px; }
        .btn-primary { display: flex; justify-content: center; align-items: center; gap: 8px; background: #1e3a8a; color: white; border: none; border-radius: 6px; padding: 11px 22px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Roboto', sans-serif; transition: all 0.2s ease-in-out; width: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3); }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary { display: inline-flex; align-items: center; gap: 6px; background: white; color: #1e3a8a; border: 2px solid #1e3a8a; border-radius: 6px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Roboto', sans-serif; transition: all 0.2s ease-in-out; }
        .btn-secondary:hover { background: rgba(30, 58, 138, 0.07); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(30, 58, 138, 0.2); }
        .btn-danger { display: inline-flex; align-items: center; gap: 4px; background: none; color: #842029; border: 1px solid #f5c6cb; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Roboto', sans-serif; transition: all 0.2s; }
        .btn-danger:hover { background: #f8d7da; }
        .credit-entry { background: rgba(245, 245, 245, 0.6); border: 1px solid #d0d8f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .credit-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .credit-entry-title { font-weight: 600; color: #1e3a8a; font-size: 0.95rem; }
        .credit-entry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .add-entry-area { margin-top: 4px; }
        .submit-row { display: flex; flex-direction: column; align-items: stretch; gap: 16px; margin-top: 8px; }
        #submitResult { margin-top: 8px; font-size: 14px; scroll-margin-top: 100px; }
        .msg-error { display: block; color: #842029; background: #f8d7da; border: 1px solid #f5c6cb; padding: 12px 16px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; text-align: center; }
        .msg-success { display: block; color: #0f5132; background: #d1e7dd; border: 1px solid #badbcc; padding: 12px 16px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; text-align: center; }
        .summary-card { background: rgba(245, 245, 245, 0.6); border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); padding: 28px 32px; margin-top: 32px; }
        .summary-card h2 { margin-top: 0; }
        .summary-field { margin: 6px 0; font-size: 15px; color: #333; }
        .summary-field strong { color: #1e3a8a; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 0.82em; }
        .status-NEW { background: #e0e0e0; color: #333; }
        .status-IN_PROCESSING { background: #fff3cd; color: #856404; }
        .status-APPROVED { background: #d1e7dd; color: #0f5132; }
        .status-DENIED { background: #f8d7da; color: #842029; }
        .status-APPEALED { background: #cfe2ff; color: #084298; }
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
        .summary-table th { background: #1e3a8a; color: white; padding: 10px 12px; text-align: left; font-weight: 500; }
        .summary-table td { padding: 9px 12px; border-bottom: 1px solid #e0e0e0; }
        .summary-table tr:last-child td { border-bottom: none; }
        .summary-table tr:nth-child(even) td { background: #f8f9ff; }
        .divider { border: none; border-top: 1px solid #e0e0e0; margin: 24px 0; }
    </style>

    <div th:replace="~{fragments/common :: navbar}"></div>

    <main class="content">
        <div class="container">
            <div class="credit-container" style="margin-bottom: 24px;">
                <h1>Submit New Application</h1>
                <p style="color:#666; margin-bottom: 0;">Fill in the form below to apply for a loan.</p>
            </div>

            <form id="loanForm">
                <div class="credit-container" style="margin-bottom: 24px;">
                    <h2>
                        <span class="material-icons" style="font-size: 1.3rem;">attach_money</span>
                        Loan Details
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="loanAmount">Loan Amount (PLN)</label>
                            <input type="number" id="loanAmount" step="0.01" min="1" max="10000000" placeholder="e.g. 25000" required>
                        </div>
                        <div class="form-group">
                            <label for="loanTermYears">Loan Term (years)</label>
                            <input type="number" id="loanTermYears" min="1" max="100" placeholder="e.g. 5" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="loanPurpose">Loan Purpose</label>
                            <textarea id="loanPurpose" rows="3" placeholder="Describe the purpose of the loan..." required></textarea>
                        </div>
                    </div>
                </div>

                <div class="credit-container" style="margin-bottom: 24px;">
                    <h2>
                        <span class="material-icons" style="font-size: 1.3rem;">account_balance_wallet</span>
                        Financial Information
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="monthlyIncome">Monthly Income (PLN)</label>
                            <input type="number" id="monthlyIncome" step="0.01" min="0" max="10000000" placeholder="e.g. 6000" required>
                        </div>
                        <div class="form-group">
                            <label for="monthlyLiabilities">Monthly Liabilities (PLN)</label>
                            <input type="number" id="monthlyLiabilities" step="0.01" min="0" max="10000000" placeholder="e.g. 500" required>
                        </div>
                    </div>
                </div>

                <div class="credit-container" style="margin-bottom: 24px;">
                    <h2>
                        <span class="material-icons" style="font-size: 1.3rem;">history</span>
                        Credit History
                    </h2>
                    <p style="color:#666; font-size:14px; margin-bottom:16px;">
                        Optionally add your existing credit obligations.
                    </p>

                    <div id="creditHistoryContainer"></div>

                    <div class="add-entry-area">
                        <button type="button" class="btn-secondary" onclick="addCreditEntry()">
                            <span class="material-icons" style="font-size: 1.1rem;">add</span>
                            Add Credit Entry
                        </button>
                    </div>
                </div>

                <div class="submit-row">
                    <button type="submit" class="btn-primary">
                        <span class="material-icons" style="font-size: 1.1rem;">send</span>
                        Submit Application
                    </button>
                    <div id="submitResult"></div>
                </div>
            </form>

            <div id="applicationSummary" style="scroll-margin-top: 100px;"></div>
        </div>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>

    <script>
        let entryCount = 0;

        function addCreditEntry() {
            entryCount++;
            const container = document.getElementById('creditHistoryContainer');
            const div = document.createElement('div');
            div.className = 'credit-entry';
            div.id = 'entry-' + entryCount;

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const minDateStr = `${yyyy}-${mm}-${dd}`;
            const maxDateStr = `${yyyy + 100}-${mm}-${dd}`;

            div.innerHTML = `
            <div class="credit-entry-header">
                <span class="credit-entry-title">
                    <span class="material-icons" style="font-size:1rem; vertical-align:middle;">credit_card</span>
                    Entry #${entryCount}
                </span>
                <button type="button" class="btn-danger" onclick="removeEntry(${entryCount})">
                    <span class="material-icons" style="font-size:0.9rem;">delete</span>
                    Remove
                </button>
            </div>
            <div class="credit-entry-grid">
                <div class="form-group">
                    <label>Amount Loaned (PLN)</label>
                    <input type="number" step="0.01" class="amountLoaned" placeholder="e.g. 10000" min="1" max="10000000" required>
                </div>
                <div class="form-group">
                    <label>Amount Still To Pay (PLN)</label>
                    <input type="number" step="0.01" class="amountStillToPay" placeholder="e.g. 5000" min="0" max="10000000" required>
                </div>
                <div class="form-group">
                    <label>Date Till Full Repayment</label>
                    <input type="date" class="dateTillFullRepayment" min="${minDateStr}" max="${maxDateStr}" required>
                </div>
                <div class="form-group">
                    <label>Monthly Cost (PLN)</label>
                    <input type="number" step="0.01" class="monthlyCost" placeholder="e.g. 300" min="0" max="1000000" required>
                </div>
            </div>
        `;
            container.appendChild(div);
        }

        function removeEntry(id) {
            document.getElementById('entry-' + id).remove();
        }

        function formatCurrency(val) {
            if (val === undefined || val === null || val === '—') return '—';
            const num = Number(val);
            if (isNaN(num)) return val;
            return Number(num.toFixed(2)).toString();
        }

        document.getElementById('loanForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const resultEl = document.getElementById('submitResult');
            const summaryEl = document.getElementById('applicationSummary');

            function showError(msg) {
                resultEl.innerHTML = `<span class="msg-error">${msg}</span>`;
                summaryEl.innerHTML = '';
                resultEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const loanAmountVal = document.getElementById('loanAmount').value;
            const loanTermYearsVal = document.getElementById('loanTermYears').value;
            const loanPurposeVal = document.getElementById('loanPurpose').value.trim();
            const monthlyIncomeVal = document.getElementById('monthlyIncome').value;
            const monthlyLiabilitiesVal = document.getElementById('monthlyLiabilities').value;

            if (!loanAmountVal || !loanTermYearsVal || !loanPurposeVal || !monthlyIncomeVal || !monthlyLiabilitiesVal) {
                showError("Please fill in all required fields.");
                return;
            }

            const loanAmount = parseFloat(loanAmountVal);
            const loanTerm = parseInt(loanTermYearsVal);
            const monthlyIncome = parseFloat(monthlyIncomeVal);
            const monthlyLiabilities = parseFloat(monthlyLiabilitiesVal);

            if (isNaN(loanAmount) || loanAmount < 1 || loanAmount > 10000000) {
                showError("Loan Amount must be between 1 and 10,000,000 PLN.");
                return;
            }
            if (isNaN(loanTerm) || loanTerm < 1 || loanTerm > 100) {
                showError("Loan Term must be between 1 and 100 years.");
                return;
            }
            if (loanPurposeVal === "") {
                showError("Loan Purpose is required.");
                return;
            }
            if (isNaN(monthlyIncome) || monthlyIncome < 0 || monthlyIncome > 10000000) {
                showError("Monthly Income must be between 0 and 10,000,000 PLN.");
                return;
            }
            if (isNaN(monthlyLiabilities) || monthlyLiabilities < 0 || monthlyLiabilities > 10000000) {
                showError("Monthly Liabilities must be between 0 and 10,000,000 PLN.");
                return;
            }

            const entries = document.querySelectorAll('.credit-entry');
            const creditHistory = [];
            const todayDate = new Date();
            todayDate.setHours(0,0,0,0);
            const maxFutureDate = new Date();
            maxFutureDate.setFullYear(maxFutureDate.getFullYear() + 100);

            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                const amountLoanedVal = entry.querySelector('.amountLoaned').value;
                const amountStillToPayVal = entry.querySelector('.amountStillToPay').value;
                const dateTillFullRepaymentVal = entry.querySelector('.dateTillFullRepayment').value;
                const monthlyCostVal = entry.querySelector('.monthlyCost').value;

                if (!amountLoanedVal || !amountStillToPayVal || !dateTillFullRepaymentVal || !monthlyCostVal) {
                    showError(`Please fill all fields for Credit Entry #${i + 1}.`);
                    return;
                }

                const amountLoaned = parseFloat(amountLoanedVal);
                const amountStillToPay = parseFloat(amountStillToPayVal);
                const monthlyCost = parseFloat(monthlyCostVal);

                if (isNaN(amountLoaned) || amountLoaned < 1 || amountLoaned > 10000000) {
                    showError(`Amount Loaned for Credit Entry #${i + 1} must be between 1 and 10,000,000 PLN.`);
                    return;
                }
                if (isNaN(amountStillToPay) || amountStillToPay < 0 || amountStillToPay > 10000000) {
                    showError(`Amount Still To Pay for Credit Entry #${i + 1} must be between 0 and 10,000,000 PLN.`);
                    return;
                }
                if (isNaN(monthlyCost) || monthlyCost < 0 || monthlyCost > 1000000) {
                    showError(`Monthly Cost for Credit Entry #${i + 1} must be between 0 and 1,000,000 PLN.`);
                    return;
                }

                const repDate = new Date(dateTillFullRepaymentVal);
                if (isNaN(repDate.getTime())) {
                    showError(`Please provide a valid date for Credit Entry #${i + 1}.`);
                    return;
                }
                if (repDate < todayDate) {
                    showError(`Date Till Full Repayment for Credit Entry #${i + 1} cannot be in the past.`);
                    return;
                }
                if (repDate > maxFutureDate) {
                    showError(`Date Till Full Repayment for Credit Entry #${i + 1} must be within 100 years.`);
                    return;
                }

                creditHistory.push({
                    amountLoaned: amountLoanedVal,
                    amountStillToPay: amountStillToPayVal,
                    dateTillFullRepayment: dateTillFullRepaymentVal,
                    monthlyCost: monthlyCostVal
                });
            }

            const response = await fetch('/api/loans', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    monthlyIncome: monthlyIncomeVal,
                    monthlyLiabilities: monthlyLiabilitiesVal,
                    loanAmount: loanAmountVal,
                    loanTermYears: loanTermYearsVal,
                    loanPurpose: loanPurposeVal,
                    creditHistory: creditHistory
                })
            });

            if (response.ok) {
                const data = await response.json();
                resultEl.innerHTML = `<span class="msg-success">Application submitted! Your ID is: <strong>${data.id}</strong>.</span>`;
                summaryEl.innerHTML = renderApplication(data);
                document.getElementById('loanForm').reset();
                document.getElementById('creditHistoryContainer').innerHTML = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                let errorMessage = 'Something went wrong. Please fill in all fields.';
                try {
                    const errorData = await response.json();
                    if (errorData?.errors?.loanPurpose) {
                        errorMessage = errorData.errors.loanPurpose;
                    } else if (errorData?.detail) {
                        errorMessage = errorData.detail;
                    } else if (errorData?.message) {
                        errorMessage = errorData.message;
                    }
                } catch (_) { }
                resultEl.innerHTML = `<span class="msg-error">${errorMessage}</span>`;
                summaryEl.innerHTML = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        function renderApplication(data) {
            const creditRows = (data.creditHistory && data.creditHistory.length > 0)
                ? data.creditHistory.map(e => `
                <tr>
                    <td>${formatCurrency(e.amountLoaned)} PLN</td>
                    <td>${formatCurrency(e.amountStillToPay)} PLN</td>
                    <td>${e.dateTillFullRepayment ?? '—'}</td>
                    <td>${formatCurrency(e.monthlyCost)} PLN</td>
                </tr>`).join('')
                : '<tr><td colspan="4" style="color:#999; font-style:italic;">No credit history provided.</td></tr>';

            return `
        <div class="summary-card credit-container">
            <h2>
                <span class="material-icons" style="font-size:1.3rem;">check_circle</span>
                Your Submitted Application
            </h2>
            <hr class="divider">
            <div class="summary-field"><strong>Application #${data.id}</strong></div>
            <div class="summary-field">Loan Amount: <strong>${formatCurrency(data.loanAmount)} PLN</strong></div>
            <div class="summary-field">Loan Term: <strong>${data.loanTermYears ?? '—'} year(s)</strong></div>
            <div class="summary-field">
                Status: <span class="status-badge status-${data.status}">${data.status}</span>
            </div>
            <div class="summary-field">Submitted: ${data.submittedAt ? new Date(data.submittedAt).toLocaleString() : '—'}</div>
            <div class="summary-field">Monthly Income: ${formatCurrency(data.monthlyIncome)} PLN</div>
            <div class="summary-field">Monthly Liabilities: ${formatCurrency(data.monthlyLiabilities)} PLN</div>
            <div class="summary-field">Loan Purpose: ${data.loanPurpose ?? '—'}</div>

            <hr class="divider">
            <h3>
                <span class="material-icons" style="font-size:1.1rem;">history</span>
                Credit History
            </h3>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>Amount Loaned</th>
                        <th>Still To Pay</th>
                        <th>Full Repayment By</th>
                        <th>Monthly Cost</th>
                    </tr>
                </thead>
                <tbody>${creditRows}</tbody>
            </table>
        </div>`;
        }
    </script>
</body>

</html>
