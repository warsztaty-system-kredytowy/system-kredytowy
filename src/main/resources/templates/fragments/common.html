<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Loan Application</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path fill=%22%231e3a8a%22 d=%22M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-8.5-9L2 6v2h19V6l-9.5-5z%22/></svg>">
    <link rel="stylesheet" type="text/css" th:href="@{/stylE.css}" href="/stylE.css">
    <link rel="stylesheet" type="text/css" th:href="@{/navbar.css}" href="/navbar.css">
    <link rel="stylesheet" type="text/css" th:href="@{/scrollbar.css}" href="/scrollbar.css">
</head>

<body>

    <!-- Public site navigation. Usage: <div th:replace="~{fragments/common :: navbar}"></div> -->
    <div th:fragment="navbar" class="mainnav">
        <div class="navbar-logo">
            <span class="material-icons">account_balance</span>
            <span class="logo-text">Loan Application</span>
        </div>

        <div class="navbar-links">
            <a th:href="@{/home}" href="/home" class="navbar-item">
                <span class="material-icons">home</span>
                <span>Home</span>
            </a>

            <div class="navbar-item dropdown">
                <a th:href="@{/applications}" href="/applications">
                    <span class="material-icons">folder</span>
                    <span>My Applications</span>
                </a>
            </div>

            <div class="navbar-item dropdown">
                <a th:href="@{/submit}" href="/submit">
                    <span class="material-icons">edit</span>
                    <span>Submit Application</span>
                </a>
            </div>

            <div class="navbar-item dropdown">
                <a th:href="@{/about-us}" href="/about-us">
                    <span class="material-icons">info</span>
                    <span>About Us</span>
                </a>
            </div>
        </div>

        <a th:href="@{/login}" href="/login" class="navbar-item login-btn"
            style="background-color: #1e3a8a; color: white !important; padding: 10px 20px; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            <span class="material-icons">login</span>
            <span>Sign In</span>
        </a>
    </div>

    <!-- Shared footer. Usage: <footer th:replace="~{fragments/common :: footer}"></footer> -->
    <footer th:fragment="footer"
        style="position: fixed; bottom: 0; left: 0; width: 100%; background-color: #1e3a8a; color: rgba(255, 255, 255, 0.9); text-align: center; padding: 15px; font-size: 0.9rem; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; font-family: 'Roboto', sans-serif;">
        <div style="margin-left: 20px; font-weight: 500;">
            Loan Application System
        </div>
        <div>
            © 2026 All Rights Reserved |
            Photo by <a href="https://unsplash.com/photos/a-person-stacking-coins-on-top-of-a-table-jpqyfK7GB4w"
                style="color: #fff; text-decoration: underline;">Towfiqu barbhuiya</a> on Unsplash
        </div>
        <div style="margin-right: 20px;">
            <a th:href="@{/about-us}" href="/about-us" style="color: #fff; text-decoration: none; margin-left: 15px;">About Us</a>
        </div>
    </footer>

</body>

</html>
