<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - Loan Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" type="text/css" href="stylE.css">
    <link rel="stylesheet" type="text/css" href="navbar.css">
    <style>
        body { font-family: 'Roboto', sans-serif; }
        main { margin-top: 80px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1e3a8a; margin-bottom: 30px; }
        .applications-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .application-card { 
            background: white; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .application-card:hover { 
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15); 
            border-color: #1e3a8a;
            transform: translateY(-2px);
        }
        .app-id { color: #1e3a8a; font-weight: 700; font-size: 1.2rem; margin-bottom: 10px; }
        .app-amount { font-size: 1.1rem; margin: 10px 0; }
        .app-status { 
            display: inline-block; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-weight: 600; 
            font-size: 0.85rem;
            margin: 10px 0;
        }
        .status-created { background: #e0e0e0; color: #333; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-accepted { background: #d1e7dd; color: #0f5132; }
        .status-denied { background: #f8d7da; color: #842029; }
        .status-appeal { background: #cfe2ff; color: #084298; }
        .app-date { color: #999; font-size: 0.9rem; margin-top: 10px; }
        .app-purpose { color: #666; margin-top: 10px; font-size: 0.95rem; }
        .view-btn { 
            display: inline-block; 
            background-color: #1e3a8a; 
            color: white; 
            padding: 8px 16px; 
            border-radius: 6px; 
            text-decoration: none; 
            margin-top: 12px;
            transition: all 0.3s;
        }
        .view-btn:hover { 
            background-color: #1e3a8a; 
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: #999;
        }
        .empty-state h2 { color: #666; }
        .empty-state a { 
            display: inline-block; 
            background-color: #1e3a8a; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 6px; 
            text-decoration: none; 
            margin-top: 20px;
            transition: all 0.3s;
        }
        .empty-state a:hover { 
            background-color: #1e3a8a; 
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }
    </style>
</head>
<body>

<div class="mainnav">
    <div class="navbar-logo">
        <span class="material-icons">account_balance</span>
        <span class="logo-text">Loan Application</span>
    </div>
    
    <div class="navbar-links">
        <a href="home.html" class="navbar-item">
            <span class="material-icons">home</span>
            <span>Home</span>
        </a>

        <div class="navbar-item dropdown">
            <a href="applications.html">
                <span class="material-icons">folder</span>
                <span>My Applications</span>
            </a>
        </div>

        <div class="navbar-item dropdown">
            <a href="index.html">
                <span class="material-icons">edit</span>
                <span>Submit Application</span>
            </a>
        </div>

        <div class="navbar-item dropdown">
            <a href="about-us.html">
                <span class="material-icons">mail</span>
                <span>Contact</span>
            </a>
        </div>
        <div class="navbar-item dropdown">
            <a href="about-us.html">
                <span class="material-icons">info</span>
                <span>About Us</span>
            </a>
        </div>
    </div>

    <a href="login.html" class="navbar-item login-btn">
        <span class="material-icons">login</span>
        <span>Log in</span>
    </a>
    <a href="employee-login.html" class="navbar-item" style="padding: 8px 12px; font-size: 0.75rem; opacity: 0.7;">
        <span class="material-icons" style="font-size: 1rem;">admin_panel_settings</span>
    </a>
</div>

<main class="content">
    <div class="container">
        <h1>My Loan Applications</h1>
        
        <div id="applicationsContainer" class="applications-grid">
            <!-- Applications will be loaded here -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>No applications yet</h2>
            <p>You haven't submitted any loan applications yet.</p>
            <a href="index.html">Create Your First Application</a>
        </div>
    </div>
</main>

<script>
    function getMockApplications() {
        return [
            {
                id: 5001,
                loanAmount: 25000,
                loanTermYears: 5,
                status: 'PENDING_REVIEW',
                submittedAt: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000),
                loanPurpose: 'Zakup samochodu osobowego'
            },
            {
                id: 5002,
                loanAmount: 50000,
                loanTermYears: 10,
                status: 'ACCEPTED',
                submittedAt: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000),
                loanPurpose: 'Remonty i ulepszenia domu'
            },
            {
                id: 5003,
                loanAmount: 15000,
                loanTermYears: 3,
                status: 'CREATED',
                submittedAt: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000),
                loanPurpose: 'Spłata pożyczek i konsolidacja długów'
            },
            {
                id: 5004,
                loanAmount: 35000,
                loanTermYears: 7,
                status: 'DENIED',
                submittedAt: new Date(Date.now() - 15 * 24 * 60 * 60 * 1000),
                loanPurpose: 'Inwestycja w edukację i szkolenia'
            }
        ];
    }

    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const response = await fetch('/api/loans');

            if (response.ok) {
                const applications = await response.json();
                displayApplications(applications);
            } else {
                // Use mock data if API fails
                const mockApps = getMockApplications();
                displayApplications(mockApps);
            }
        } catch (error) {
            console.error('Error loading applications:', error);
            // Use mock data as fallback
            const mockApps = getMockApplications();
            displayApplications(mockApps);
        }
    });

    function displayApplications(applications) {
        const container = document.getElementById('applicationsContainer');
        const emptyState = document.getElementById('emptyState');

        if (!applications || applications.length === 0) {
            showEmptyState();
            return;
        }

        emptyState.style.display = 'none';
        container.innerHTML = applications.map(app => `
            <div class="application-card">
                <div class="app-id">Application #${app.id}</div>
                <div class="app-amount">Amount: ${app.loanAmount} PLN</div>
                <div class="app-amount">Term: ${app.loanTermYears} year(s)</div>
                <div class="app-status status-${getStatusClass(app.status)}">
                    ${app.status}
                </div>
                <div class="app-purpose">${app.loanPurpose}</div>
                <div class="app-date">${new Date(app.submittedAt).toLocaleDateString('pl-PL')}</div>
                <a href="#" class="view-btn" onclick="viewDetails(${app.id}); return false;">View Details</a>
            </div>
        `).join('');
    }

    function getStatusClass(status) {
        const map = {
            'CREATED': 'created',
            'PENDING_REVIEW': 'pending',
            'ACCEPTED': 'accepted',
            'DENIED': 'denied',
            'APPEAL': 'appeal'
        };
        return map[status] || 'created';
    }

    function showEmptyState() {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('applicationsContainer').innerHTML = '';
    }

    function viewDetails(appId) {
        alert('Application details for #' + appId + ' - Feature coming soon!');
    }
</script>

</body>
</html>
